name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: baridik-backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          timeout: 60s
          command_timeout: 40m

          script: |
            set -euo pipefail

            APP_DIR="/home/baridik/apps/backend"
            SERVICE_NAME="baridik-backend"
            HEALTH_URL="http://127.0.0.1:5055"

            echo "Go to backend directory"
            cd "$APP_DIR"

            echo "Current path:"
            pwd

            echo "Pull latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "Stop backend service"
            sudo -n systemctl stop "$SERVICE_NAME" || true

            echo "Restore packages"
            dotnet restore BaridikExpress.sln --disable-parallel

            echo "Build backend"
            dotnet build BaridikExpress.sln -c Release --no-restore /p:TreatWarningsAsErrors=false

            echo "Run database migrations"
            export PATH="$PATH:$HOME/.dotnet/tools"
            dotnet ef database update \
              --project BaridikExpress.Infrastructure \
              --startup-project BaridikExpress.API

            echo "Start backend service"
            sudo -n systemctl start "$SERVICE_NAME"

            echo "Wait for backend to listen"
            sleep 10

            echo "Check backend service"
            systemctl is-active --quiet "$SERVICE_NAME"
            systemctl status "$SERVICE_NAME" --no-pager || true

            echo "Check local backend port"
            ss -tulpn | grep 5055

            echo "Health check"
            curl -I "$HEALTH_URL" || true

            echo "Backend deployed successfully"
