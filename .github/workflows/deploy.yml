name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: baridik-backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          timeout: 180s
          command_timeout: 40m

          script: |
            set -euo pipefail

            APP_DIR="/home/baridik/apps/backend"
            SERVICE_NAME="baridik-backend"
            HEALTH_URL="http://127.0.0.1:5055"
            DOTNET_EF="/home/baridik/.dotnet/tools/dotnet-ef"

            export ASPNETCORE_ENVIRONMENT="Production"
            export DOTNET_ENVIRONMENT="Production"
            export ConnectionStrings__DefaultConnection='${{ secrets.DB_CONNECTION_STRING }}'

            echo "==> Go to backend directory"
            cd "$APP_DIR"
            pwd

            echo "==> Pull latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Stop backend service"
            sudo -n systemctl stop "$SERVICE_NAME" || true

            echo "==> Restore packages"
            dotnet restore BaridikExpress.sln --disable-parallel

            echo "==> Build backend"
            dotnet build BaridikExpress.sln \
              --configuration Release \
              --no-restore \
              /p:TreatWarningsAsErrors=false \
              /p:UseSharedCompilation=false \
              /nodeReuse:false

            echo "==> Check dotnet-ef"
            test -x "$DOTNET_EF"

            echo "==> Run database migrations"
            "$DOTNET_EF" database update \
              --project BaridikExpress.Infrastructure \
              --startup-project BaridikExpress.API \
              --configuration Release

            echo "==> Start backend service"
            sudo -n systemctl start "$SERVICE_NAME"

            echo "==> Wait for backend to listen on port 5055"
            PORT_READY=false

            for attempt in $(seq 1 30); do
              if ss -lnt | grep -qE '127\.0\.0\.1:5055|0\.0\.0\.0:5055'; then
                PORT_READY=true
                echo "Backend is listening on port 5055"
                break
              fi

              echo "Waiting for backend... attempt ${attempt}/30"
              sleep 3
            done

            if [ "$PORT_READY" != "true" ]; then
              echo "ERROR: Backend did not listen on port 5055"

              systemctl status "$SERVICE_NAME" --no-pager || true
              journalctl -u "$SERVICE_NAME" -n 120 --no-pager || true

              exit 1
            fi

            echo "==> Check backend service"
            systemctl is-active --quiet "$SERVICE_NAME"
            systemctl status "$SERVICE_NAME" --no-pager || true

            echo "==> Health check"
            HTTP_CODE="$(curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out '%{http_code}' \
              "$HEALTH_URL" || true)"

            echo "Local HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" = "000" ]; then
              echo "ERROR: Backend could not be reached"

              systemctl status "$SERVICE_NAME" --no-pager || true
              journalctl -u "$SERVICE_NAME" -n 120 --no-pager || true

              exit 1
            fi

            echo "==> Backend deployed successfully"
